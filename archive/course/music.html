<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moonlight Style</title>
</head>
<body>
<h3>Playing...</h3>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();

const notes = {
  "C#3": 138.59,
  "E3": 164.81,
  "G#3": 207.65,
  "C#4": 277.18
};

const pattern = [
  "C#3","G#3","C#4","G#3",
  "C#3","E3","G#3","E3",
  "C#3","G#3","E3","C#4"
];

function playNote(freq, time, dur) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.2, time);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start(time);
  osc.stop(time + dur);
}

let t = ctx.currentTime;

for (let i = 0; i < 12; i++) {
  const n = notes[pattern[i]];
  playNote(n, t, 0.4);
  t += 0.35;
}
</script>

</body>
</html>
