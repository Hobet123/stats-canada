<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canadian Cities Map</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .info-window {
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
async function initMap() {

    // Create map
    const map = new google.maps.Map(document.getElementById("map"), {
        center: {
            lat: 56.1304,
            lng: -106.3468
        },
        zoom: 4
    });

    try {

        // Load cities from your API
        const response = await fetch('api/cities.php');
        const cities = await response.json();

        const bounds = new google.maps.LatLngBounds();

        cities.forEach(city => {

            const position = {
                lat: parseFloat(city.lat),
                lng: parseFloat(city.lon)
            };

            const marker = new google.maps.Marker({
                position: position,
                map: map,
                title: city.city_name
            });

            const infoWindow = new google.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <strong>${city.city_name}</strong><br>
                        ${city.prov_name} (${city.prov_abbr})
                    </div>
                `
            });

            marker.addListener("click", () => {
                infoWindow.open(map, marker);
            });

            bounds.extend(position);
        });

        // Automatically fit map to all cities
        if (cities.length > 0) {
            map.fitBounds(bounds);
        }

    } catch (error) {
        console.error("Error loading cities:", error);
    }
}
</script>

<!-- Replace YOUR_GOOGLE_API_KEY with your actual key -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDThHJW82eDJvu3mQKUjhXqHvJXByiQ3zE&callback=initMap">
</script>

</body>
</html>
