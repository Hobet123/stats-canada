<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian Cities</title>

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

body {
    background: #111;
}

#map {
    width: 100%;
    height: 100vh;
}

.city-popup {
    text-align: center;
    line-height: 1.4;
}

.city-name {
    font-size: 15px;
    font-weight: bold;
}

.province {
    color: #666;
    font-size: 13px;
}

.glow-dot {
    filter: drop-shadow(0 0 6px #00e5ff);
}

.leaflet-tooltip {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    box-shadow: none;
    font-size: 13px;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map', {
    zoomControl: true
});

L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',
    {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }
).addTo(map);

loadData();

async function loadData() {

    try {

        const [citiesRes, rentRes] = await Promise.all([
            fetch('api/cities.php'),
        ]);

        const cities = await citiesRes.json();

        const bounds = [];

        cities.forEach(city => {

            const lat = parseFloat(city.lat);
            const lon = parseFloat(city.lon);

            if (isNaN(lat) || isNaN(lon)) return;

            bounds.push([lat, lon]);

            city.rent = rentGrouped[String(city.geo_id)] || null;

            const popupId = `popup-${city.city_id}`;

            const marker = L.circleMarker([lat, lon], {
                radius: 5,
                color: "#00e5ff",
                weight: 1,
                fillColor: "#00e5ff",
                fillOpacity: 0.9,
                className: 'glow-dot'
            })
            .addTo(map)
            .bindTooltip(
                `${city.city_name}, ${city.prov_abbr}`,
                {
                    direction: 'top',
                    offset: [0, -8]
                }
            )
            .bindPopup(buildPopup(city));
            // .bindPopup(`<div id="${popupId}">Loading...${popupId}</div>`);
        });

        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [40, 40] });
        }

    } catch (err) {
        console.error(err);
        alert('Unable to load city data.');
    }
}

function buildPopup(city) {

    if (!city.rent || !city.rent.types || city.rent.types.length === 0) {
        return `
            <b>${city.city_name}</b><br>
            <span style="color:#aaa">${city.prov_abbr}</span><br>
            <hr>
            <span style="color:red">No rent data</span>
        `;
    }

    let html = `
        <b>${city.city_name}</b><br>
        <span style="color:#aaa">${city.prov_abbr}</span>
        <hr>
    `;

    const grouped = {};

    city.rent.types.forEach(t => {

        const type = t.property_type ?? "Unknown";
        const beds = t.bedrooms ?? "0";
        const price = Number(t.rent_price);

        if (isNaN(price)) return;

        const key = `${type}-${beds}`;

        if (!grouped[key]) {
            grouped[key] = [];
        }

        grouped[key].push(price);
    });

    for (const key in grouped) {

        const prices = grouped[key];

        const avg = Math.round(
            prices.reduce((a, b) => a + b, 0) / prices.length
        );

        const parts = key.split('-');
        const type = parts[0] || "Unknown";
        const beds = parts[1] || "0";

        html += `
            <div style="color:white;">
                ${type} / ${beds} bed: <b>$${avg}</b>
            </div>
        `;
    }

    return html;
}

</script>

</body>
</html>
